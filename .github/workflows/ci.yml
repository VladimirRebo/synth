name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: .NET build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: dotnet build
        run: dotnet build Synth.slnx --nologo -v q

      - name: dotnet test
        run: dotnet test Synth.slnx --nologo -v q

  client:
    name: Client build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: npm build
        run: npm run build --silent

      - name: npm test
        run: npm test -- --run
